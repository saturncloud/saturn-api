info:
  description: The API for Saturn Cloud.
  title: Saturn Cloud
  version: 2025.06.01-36
servers: []
security:
- bearerAuth: []
paths:
  /api/auth/login:
    post:
      description: Login with username/password and set session cookie
      operationId: authorization_login
      tags:
      - authorization
      parameters:
      - in: query
        name: username
        schema:
          type: string
        required: true
      - in: query
        name: password
        schema:
          type: string
        required: true
      responses:
        '204':
          description: Ok
  /api/auth/logout:
    get:
      description: Logout from current session
      operationId: authorization_logout
      tags:
      - authorization
      parameters:
      - in: query
        name: username
        schema:
          type: string
        required: true
      - in: query
        name: password
        schema:
          type: string
        required: true
      responses:
        '302':
          description: Redirect
  /api/auth/token:
    get:
      description: Initialize oauth
      operationId: authorization_getOauthInit
      tags:
      - authorization
      parameters:
      - in: query
        name: response_type
        schema:
          type: string
          enum:
          - code
        required: true
      - in: query
        name: client_id
        schema:
          type: string
          enum:
          - saturn-auth-proxy
        required: true
      - in: query
        name: code_challenge
        schema:
          type: string
        required: true
      - in: query
        name: code_challenge_method
        schema:
          type: string
          default: plain
          enum:
          - plain
          - S256
        required: false
      - in: query
        name: redirect_uri
        schema:
          type: string
        required: true
      - in: query
        name: state
        schema:
          type: string
        required: false
      responses:
        '302':
          description: Redirect
    post:
      description: Request new auth tokens from oauth code or refresh token grant
      operationId: authorization_createOauthToken
      tags:
      - authorization
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuthorizationGrant'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthorizationTokenResponse'
          description: Created
  /api/dask_clusters:
    get:
      description: List dask clusters
      operationId: daskclusters_list
      tags:
      - dask_clusters
      parameters:
      - in: query
        name: owner_name
        schema:
          type: string
          pattern: ^(?:(?P<org>[a-z\d](?:[a-z\d]|-(?=[a-z\d])){0,38})\/)?(?P<identity>[a-z\d](?:[a-z\d]|-(?=[a-z\d])){0,38})$
        required: false
      - in: query
        name: owner_id
        schema:
          type: string
        required: false
      - in: query
        name: user_id
        schema:
          type: string
          default: null
          nullable: true
        required: false
      - in: query
        name: group_id
        schema:
          type: string
          default: null
          nullable: true
        required: false
      - in: query
        name: org_id
        schema:
          type: string
          default: null
          nullable: true
        required: false
      - in: query
        name: owner
        schema:
          type: string
          pattern: ^(?:(?P<org>[a-z\d](?:[a-z\d]|-(?=[a-z\d])){0,38})\/)?(?P<identity>[a-z\d](?:[a-z\d]|-(?=[a-z\d])){0,38})$
        required: false
      - in: query
        name: prev_key
        schema:
          type: string
        required: false
      - in: query
        name: next_key
        schema:
          type: string
        required: false
      - in: query
        name: page_size
        schema:
          type: integer
          default: 100
          minimum: 1
          maximum: 1000
        required: false
      - in: query
        name: descending
        schema:
          type: boolean
          default: false
        required: false
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DaskClusterList'
          description: Ok
    post:
      description: Create dask cluster
      operationId: daskclusters_create
      tags:
      - dask_clusters
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DaskClusterCreate'
        required: true
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DaskCluster'
          description: Created
  /api/dask_clusters/{dask_cluster_id}:
    delete:
      description: Delete dask cluster
      operationId: daskclusters_delete
      tags:
      - dask_clusters
      parameters:
      - name: dask_cluster_id
        in: path
        schema:
          type: string
        required: true
      - in: query
        name: allow_active
        schema:
          type: boolean
          default: false
        required: false
      responses:
        '204':
          description: Deleted
    get:
      description: Get dask cluster
      operationId: daskclusters_get
      tags:
      - dask_clusters
      parameters:
      - name: dask_cluster_id
        in: path
        schema:
          type: string
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DaskCluster'
          description: Ok
    patch:
      description: Update dask cluster
      operationId: daskclusters_update
      tags:
      - dask_clusters
      parameters:
      - name: dask_cluster_id
        in: path
        schema:
          type: string
        required: true
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DaskClusterUpdate'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DaskCluster'
          description: Updated
  /api/dask_clusters/{dask_cluster_id}/adapt:
    post:
      description: Set dask cluster adaptive scaling
      operationId: daskclusters_adapt
      tags:
      - dask_clusters
      parameters:
      - name: dask_cluster_id
        in: path
        schema:
          type: string
        required: true
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DaskClusterAdapt'
        required: true
      responses:
        '204':
          description: Ok
  /api/dask_clusters/{dask_cluster_id}/history:
    get:
      description: Get dask cluster status history
      operationId: daskclusters_getStatusHistory
      tags:
      - dask_clusters
      parameters:
      - name: dask_cluster_id
        in: path
        schema:
          type: string
        required: true
      - in: query
        name: component
        schema:
          type: string
          enum:
          - kubecluster
          - scheduler
          - worker
          - null
          nullable: true
        required: false
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResourceHistory'
          description: Ok
  /api/dask_clusters/{dask_cluster_id}/info:
    get:
      description: Get dask cluster info
      operationId: daskclusters_getInfo
      tags:
      - dask_clusters
      parameters:
      - name: dask_cluster_id
        in: path
        schema:
          type: string
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
          description: Ok
  /api/dask_clusters/{dask_cluster_id}/kubecluster/runtimesummary:
    get:
      description: Get dask cluster kubecluster runtime summary
      operationId: daskclusters_getKubeclusterRuntimeSummary
      tags:
      - dask_clusters
      parameters:
      - name: dask_cluster_id
        in: path
        schema:
          type: string
        required: true
      - in: query
        name: details
        schema:
          type: boolean
          default: false
        required: false
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeploymentRuntimeSummary'
          description: Ok
  /api/dask_clusters/{dask_cluster_id}/logs:
    get:
      description: Get dask cluster historical logs
      operationId: daskclusters_getLogHistory
      tags:
      - dask_clusters
      parameters:
      - name: dask_cluster_id
        in: path
        schema:
          type: string
        required: true
      - in: query
        name: component
        schema:
          type: string
          enum:
          - kubecluster
          - scheduler
          - worker
          - null
          nullable: true
        required: false
      - in: query
        name: pod_name
        schema:
          type: string
          nullable: true
        required: false
      - in: query
        name: cluster
        schema:
          type: string
          nullable: true
        required: false
      - in: query
        name: first_key
        schema:
          type: string
          nullable: true
        required: false
      - in: query
        name: last_key
        schema:
          type: string
          nullable: true
        required: false
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HistoricLogs'
          description: Ok
  /api/dask_clusters/{dask_cluster_id}/metrics:
    get:
      description: Get dask cluster hardware metrics
      operationId: daskclusters_getMetrics
      tags:
      - dask_clusters
      parameters:
      - name: dask_cluster_id
        in: path
        schema:
          type: string
        required: true
      - in: query
        name: component
        schema:
          type: string
          enum:
          - kubecluster
          - scheduler
          - worker
          - null
          nullable: true
        required: false
      - in: query
        name: type
        schema:
          type: string
          nullable: true
        required: false
      - in: query
        name: start
        schema:
          type: string
          format: date-time
          nullable: true
        required: false
      - in: query
        name: end
        schema:
          type: string
          format: date-time
          nullable: true
        required: false
      - in: query
        name: resolution
        schema:
          type: string
          nullable: true
        required: false
      - in: query
        name: cluster
        schema:
          type: string
          nullable: true
        required: false
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Metrics'
          description: Ok
  /api/dask_clusters/{dask_cluster_id}/restart:
    post:
      description: Restart dask cluster
