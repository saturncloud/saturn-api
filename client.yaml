  /api/deployments/{deployment_id}/history:
    get:
      description: Get deployment status history
      operationId: deployments_getStatusHistory
      tags:
      - deployments
      parameters:
      - name: deployment_id
        in: path
        schema:
          type: string
        required: true
      - in: query
        name: cluster
        schema:
          type: string
          nullable: true
        required: false
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResourceHistory'
