                $ref: '#/components/schemas/DeploymentRecipe'
          description: Ok
  /api/deployments/{deployment_id}/restart:
    post:
      description: Restart deployment
      operationId: deployments_restart
      tags:
      - deployments
      parameters:
      - name: deployment_id
