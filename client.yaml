          items:
            $ref: '#/components/schemas/ExternalRepoAttachmentPartial'
        id:
          type: string
          readOnly: true
        image_tag:
          readOnly: true
          allOf:
          - $ref: '#/components/schemas/ResourceImageTag'
        resource_type:
