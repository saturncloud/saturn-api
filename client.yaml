                $ref: '#/components/schemas/Metrics'
          description: Ok
  /api/deployments/{deployment_id}/recipe:
    get:
      description: Get deployment recipe
      operationId: deployments_getRecipe
      tags:
      - deployments
      parameters:
      - name: deployment_id
        in: path
        schema:
          type: string
        required: true
      - in: query
        name: as_template
        schema:
          type: boolean
