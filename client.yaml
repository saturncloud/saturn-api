        in: path
        schema:
          type: string
        required: true
      - in: query
        name: page
        schema:
          type: integer
          default: 1
          minimum: 1
        required: false
      - in: query
        name: page_size
        schema:
          type: integer
          default: 100
          maximum: 1000
        required: false
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DaskWorkersRuntimeSummaryPage'
          description: Ok
  /api/dask_clusters/info:
