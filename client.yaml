info:
  description: The API for Saturn Cloud.
  title: Saturn Cloud
  version: 2025.10.01
servers: []
security:
- bearerAuth: []
paths:
  /api/active/pods:
    get:
      summary: List pod runtime summaries
      operationId: active_listPods
      tags:
      - active
      parameters:
      - in: query
        name: workload_type
        schema:
          $ref: '#/components/schemas/WorkloadType'
        required: true
      - in: query
        name: workload_id
        schema:
          type: string
        required: true
      - in: query
        name: cluster
        schema:
          type: string
        required: false
      - in: query
        name: prev_key
        schema:
          type: string
        required: false
      - in: query
        name: next_key
        schema:
          type: string
        required: false
      - in: query
        name: page_size
        schema:
          type: integer
          default: 100
          minimum: 1
          maximum: 1000
        required: false
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PodRuntimeSummaryList'
          description: Ok
  /api/active/pods/{name}:
    get:
      summary: Get pod runtime summary
      operationId: active_getPod
      tags:
      - active
      parameters:
      - in: path
        name: name
        schema:
          type: string
        required: true
      - in: query
        name: cluster
        schema:
          type: string
        required: false
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PodRuntimeSummary'
          description: Ok
  /api/active/pods/{name}/logs:
    get:
      summary: Get pod logs
      operationId: active_getPodLogs
      tags:
      - active
      parameters:
      - in: path
        name: name
        schema:
          type: string
        required: true
      - in: query
        name: container_name
        schema:
          type: string
        required: false
      - in: query
        name: previous
        schema:
          type: boolean
          default: false
        required: false
      - in: query
        name: cluster
        schema:
          type: string
        required: false
      - in: query
        name: page_size
        schema:
          type: integer
          default: 1000
          minimum: 1
          maximum: 5000
        required: false
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PodLogs'
          description: Ok
  /api/active/resources:
    get:
      summary: List active resources
      operationId: active_listResources
      tags:
      - active
      parameters:
      - in: query
        name: user_id
        schema:
          type: string
          default: null
          nullable: true
        required: false
      - in: query
        name: group_id
        schema:
          type: string
          default: null
          nullable: true
        required: false
      - in: query
        name: org_id
        schema:
          type: string
          default: null
          nullable: true
        required: false
      - in: query
        name: resource_type
        schema:
          $ref: '#/components/schemas/ResourceType'
        required: false
      - in: query
        name: list_by
        schema:
          type: string
          default: owner
          enum:
          - owner
          - org
          - account
        required: false
      - in: query
        name: prev_key
        schema:
          type: string
        required: false
      - in: query
        name: next_key
        schema:
          type: string
        required: false
      - in: query
        name: page_size
        schema:
          type: integer
          default: 100
          minimum: 1
          maximum: 1000
        required: false
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ActiveResourceList'
          description: Ok
  /api/auth/login:
    post:
      summary: Login
      description: Create a new browser session.
      operationId: authorization_login
      tags:
      - authorization
      parameters:
      - in: query
        name: username
        schema:
          type: string
        required: true
      - in: query
        name: password
        schema:
          type: string
        required: true
      responses:
        '204':
          description: Ok
  /api/auth/logout:
    get:
      summary: Logout
      description: End the current browser session.
      operationId: authorization_logout
      tags:
      - authorization
      parameters:
      - in: query
        name: username
        schema:
          type: string
        required: true
      - in: query
        name: password
        schema:
          type: string
        required: true
      responses:
        '302':
          description: Redirect
  /api/auth/token:
    get:
      summary: Initialize oauth
      description: Begin an OAuth code grant flow.
      operationId: authorization_getOauthInit
      tags:
      - authorization
      parameters:
      - in: query
        name: response_type
        schema:
          type: string
          enum:
          - code
        required: true
      - in: query
        name: client_id
        schema:
          type: string
          enum:
          - saturn-auth-proxy
        required: true
      - in: query
        name: code_challenge
        schema:
          type: string
        required: true
      - in: query
        name: code_challenge_method
        schema:
          type: string
          default: plain
          enum:
          - plain
          - S256
        required: false
      - in: query
        name: redirect_uri
        schema:
          type: string
        required: true
      - in: query
        name: state
        schema:
          type: string
        required: false
      responses:
        '302':
          description: Redirect
    post:
      summary: Create OAuth token
      description: Request new token from oauth code or refresh token grant.
      operationId: authorization_createOauthToken
      tags:
      - authorization
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuthorizationGrant'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthorizationTokenResponse'
          description: Created
  /api/dask_clusters:
    get:
      summary: List dask clusters
      description: Paginated list of dask clusters.
      operationId: daskclusters_list
      tags:
      - dask_clusters
      parameters:
      - in: query
        name: owner_name
        schema:
          type: string
        required: false
      - in: query
        name: owner_id
        schema:
          type: string
        required: false
      - in: query
        name: user_id
        schema:
          type: string
          default: null
          nullable: true
        required: false
      - in: query
        name: group_id
        schema:
          type: string
          default: null
          nullable: true
        required: false
      - in: query
        name: org_id
        schema:
          type: string
          default: null
          nullable: true
        required: false
      - in: query
        name: owner
        schema:
          type: string
          pattern: ^(?:(?P<org>[a-z\d](?:[a-z\d]|-(?=[a-z\d])){0,38})\/)?(?P<identity>[a-z\d](?:[a-z\d]|-(?=[a-z\d])){0,38})$
        required: false
      - in: query
        name: prev_key
        schema:
          type: string
        required: false
      - in: query
        name: next_key
        schema:
          type: string
        required: false
      - in: query
        name: page_size
        schema:
          type: integer
          default: 100
          minimum: 1
          maximum: 1000
        required: false
      - in: query
        name: descending
        schema:
          type: boolean
          default: false
        required: false
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DaskClusterList'
          description: Ok
    post:
      summary: Create dask cluster
      description: Create a new dask cluster.
      operationId: daskclusters_create
      tags:
      - dask_clusters
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DaskClusterCreate'
        required: true
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DaskCluster'
          description: Created
  /api/dask_clusters/{dask_cluster_id}:
    delete:
      summary: Delete dask cluster
      description: Delete a dask cluster.
      operationId: daskclusters_delete
      tags:
      - dask_clusters
      parameters:
      - name: dask_cluster_id
        in: path
        schema:
          type: string
        required: true
      - in: query
        name: allow_active
        schema:
          type: boolean
          default: false
        required: false
      responses:
        '204':
          description: Deleted
    get:
      summary: Get dask cluster
      description: Get a dask cluster.
      operationId: daskclusters_get
      tags:
      - dask_clusters
      parameters:
      - name: dask_cluster_id
        in: path
        schema:
          type: string
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DaskCluster'
          description: Ok
    patch:
      summary: Update dask cluster
      description: Update a dask cluster.
      operationId: daskclusters_update
      tags:
      - dask_clusters
      parameters:
      - name: dask_cluster_id
        in: path
        schema:
          type: string
        required: true
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DaskClusterUpdate'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DaskCluster'
          description: Updated
  /api/dask_clusters/{dask_cluster_id}/adapt:
    post:
      summary: Set dask cluster adaptive scaling
      operationId: daskclusters_adapt
      tags:
      - dask_clusters
      parameters:
      - name: dask_cluster_id
        in: path
        schema:
          type: string
        required: true
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DaskClusterAdapt'
        required: true
      responses:
        '204':
          description: Ok
  /api/dask_clusters/{dask_cluster_id}/history:
    get:
      summary: Get dask cluster pod history
      description: Get history of pods run for the dask cluster.
      operationId: daskclusters_getPodHistory
      tags:
      - dask_clusters
      parameters:
      - name: dask_cluster_id
        in: path
        schema:
          type: string
        required: true
      - in: query
        name: component
        schema:
          $ref: '#/components/schemas/DaskComponents'
        required: false
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResourceHistory'
          description: Ok
  /api/dask_clusters/{dask_cluster_id}/info:
    get:
      summary: Get dask cluster info
      operationId: daskclusters_getInfo
      tags:
      - dask_clusters
      parameters:
      - name: dask_cluster_id
        in: path
        schema:
          type: string
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
          description: Ok
  /api/dask_clusters/{dask_cluster_id}/kubecluster/runtimesummary:
    get:
      summary: Get dask cluster kubecluster runtime summary
      description: Summary of the current runtime status.
      operationId: daskclusters_getKubeclusterRuntimeSummary
      tags:
      - dask_clusters
      parameters:
      - name: dask_cluster_id
        in: path
        schema:
          type: string
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeploymentRuntimeSummary'
          description: Ok
  /api/dask_clusters/{dask_cluster_id}/logs:
    get:
      summary: Get dask cluster historical logs
      description: Historical record of logs from the resource.
      operationId: daskclusters_getLogs
      tags:
      - dask_clusters
      parameters:
      - name: dask_cluster_id
        in: path
        schema:
          type: string
        required: true
      - in: query
        name: pod_name
        schema:
          type: string
        required: false
      - in: query
        name: cluster
        schema:
          type: string
        required: false
      - in: query
        name: prev_key
        schema:
          type: string
        required: false
      - in: query
        name: next_key
        schema:
          type: string
        required: false
      - in: query
        name: page_size
        schema:
          type: integer
          default: 100
          minimum: 1
          maximum: 1000
        required: false
      - in: query
        name: component
        schema:
          $ref: '#/components/schemas/DaskComponents'
        required: false
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HistoricLogList'
          description: Ok
  /api/dask_clusters/{dask_cluster_id}/metrics:
    get:
      summary: Get dask cluster metrics
      description: Hardware utilization metrics.
      operationId: daskclusters_getMetrics
      tags:
      - dask_clusters
      parameters:
      - name: dask_cluster_id
        in: path
        schema:
          type: string
        required: true
      - in: query
        name: component
        schema:
          $ref: '#/components/schemas/DaskComponents'
        required: false
      - in: query
        name: type
        schema:
          type: string
        required: false
      - in: query
        name: start
        schema:
          type: string
          format: date-time
        required: false
      - in: query
        name: end
        schema:
          type: string
          format: date-time
        required: false
      - in: query
        name: resolution
        schema:
          type: string
        required: false
      - in: query
        name: cluster
        schema:
          type: string
        required: false
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Metrics'
          description: Ok
  /api/dask_clusters/{dask_cluster_id}/restart:
    post:
      summary: Restart dask cluster
      description: Restart a running dask cluster.
      operationId: daskclusters_restart
      tags:
      - dask_clusters
      parameters:
      - name: dask_cluster_id
        in: path
        schema:
          type: string
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DaskCluster'
          description: Restarted
  /api/dask_clusters/{dask_cluster_id}/runtimesummary:
    get:
      summary: Get dask cluster runtime summary
      description: Summary of the current runtime status.
      operationId: daskclusters_getRuntimeSummary
      tags:
      - dask_clusters
      parameters:
      - name: dask_cluster_id
        in: path
        schema:
          type: string
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DaskClusterRuntimeSummary'
          description: Ok
  /api/dask_clusters/{dask_cluster_id}/scale:
    post:
      summary: Scale dask cluster worker count
      operationId: daskclusters_scale
      tags:
      - dask_clusters
      parameters:
      - name: dask_cluster_id
        in: path
        schema:
          type: string
        required: true
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DaskClusterScale'
        required: true
      responses:
        '204':
          description: Ok
  /api/dask_clusters/{dask_cluster_id}/scheduler/runtimesummary:
    get:
      summary: Get dask cluster scheduler runtime summary
      description: Summary of the current runtime status.
      operationId: daskclusters_getSchedulerRuntimesummary
      tags:
      - dask_clusters
      parameters:
      - name: dask_cluster_id
        in: path
        schema:
          type: string
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PodRuntimeSummary'
          description: Ok
  /api/dask_clusters/{dask_cluster_id}/scheduler_info:
    get:
      summary: Get dask cluster scheduler info
      operationId: daskclusters_getSchedulerInfo
      tags:
      - dask_clusters
      parameters:
      - name: dask_cluster_id
        in: path
        schema:
          type: string
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
          description: Ok
  /api/dask_clusters/{dask_cluster_id}/start:
    post:
      summary: Start dask cluster
      description: Run a dask cluster.
      operationId: daskclusters_start
      tags:
      - dask_clusters
      parameters:
      - name: dask_cluster_id
        in: path
        schema:
          type: string
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DaskCluster'
          description: Started
  /api/dask_clusters/{dask_cluster_id}/status:
    get:
      summary: Get dask cluster scheduler status
      operationId: daskclusters_getSchedulerStatus
      tags:
      - dask_clusters
      parameters:
      - name: dask_cluster_id
        in: path
        schema:
          type: string
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
          description: Ok
  /api/dask_clusters/{dask_cluster_id}/stop:
    post:
      summary: Stop dask cluster
      description: Stop a running dask cluster.
      operationId: daskclusters_stop
      tags:
      - dask_clusters
      parameters:
      - name: dask_cluster_id
        in: path
        schema:
          type: string
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DaskCluster'
          description: Stopped
  /api/dask_clusters/{dask_cluster_id}/token:
    get:
      summary: Get dask cluster API token info
      operationId: daskclusters_getTokenInfo
      tags:
      - dask_clusters
      parameters:
      - name: dask_cluster_id
        in: path
        schema:
          type: string
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResourceTokenInfo'
          description: Ok
    patch:
      summary: Update dask cluster API token
      description: Update API token scope on the dask cluster. Invalidates existing
        tokens.
      operationId: daskclusters_updateToken
      tags:
      - dask_clusters
      parameters:
      - name: dask_cluster_id
        in: path
        schema:
          type: string
        required: true
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResourceTokenUpdate'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResourceTokenInfo'
          description: Updated
    post:
      summary: Rotate dask cluster API token
      description: Invalidate existing API tokens for the dask cluster.
      operationId: daskclusters_rotateToken
      tags:
      - dask_clusters
      parameters:
      - name: dask_cluster_id
        in: path
        schema:
          type: string
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResourceTokenInfo'
          description: Rotated
  /api/dask_clusters/{dask_cluster_id}/workers/runtimesummary:
    get:
      summary: List dask cluster worker runtime summaries
      operationId: daskclusters_listWorkerRuntimeSummaries
      tags:
      - dask_clusters
      parameters:
      - name: dask_cluster_id
        in: path
        schema:
          type: string
        required: true
      - in: query
        name: prev_key
        schema:
          type: string
        required: false
      - in: query
        name: next_key
        schema:
          type: string
        required: false
      - in: query
        name: page_size
        schema:
          type: integer
          default: 100
          minimum: 1
          maximum: 1000
        required: false
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DaskWorkerRuntimeSummaryList'
          description: Ok
  /api/dask_clusters/info:
    get:
      summary: Get dask cluster server options
      operationId: daskclusters_getServerOptions
      tags:
      - dask_clusters
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DaskClusterServerOptions'
          description: Ok
  /api/deployments:
    get:
      summary: List deployments
      description: Paginated list of deployments.
      operationId: deployments_list
      tags:
      - deployments
      parameters:
      - in: query
        name: owner_name
        schema:
          type: string
        required: false
      - in: query
        name: owner_id
        schema:
          type: string
        required: false
      - in: query
        name: user_id
        schema:
          type: string
          default: null
          nullable: true
        required: false
      - in: query
        name: group_id
        schema:
          type: string
          default: null
          nullable: true
        required: false
      - in: query
        name: org_id
        schema:
          type: string
          default: null
          nullable: true
        required: false
      - in: query
        name: owner
        schema:
          type: string
          pattern: ^(?:(?P<org>[a-z\d](?:[a-z\d]|-(?=[a-z\d])){0,38})\/)?(?P<identity>[a-z\d](?:[a-z\d]|-(?=[a-z\d])){0,38})$
        required: false
      - in: query
        name: name
        schema:
          type: string
        required: false
      - in: query
        name: prev_key
        schema:
          type: string
        required: false
      - in: query
        name: next_key
        schema:
          type: string
        required: false
      - in: query
        name: page_size
        schema:
          type: integer
          default: 100
          minimum: 1
          maximum: 1000
        required: false
      - in: query
        name: descending
        schema:
          type: boolean
          default: false
        required: false
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeploymentList'
          description: Ok
    post:
      summary: Create deployment
      description: Create a new deployment.
      operationId: deployments_create
      tags:
      - deployments
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DeploymentCreate'
        required: true
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Deployment'
          description: Created
  /api/deployments/{deployment_id}:
    delete:
      summary: Delete deployment
      description: Delete a deployment.
      operationId: deployments_delete
      tags:
      - deployments
      parameters:
      - name: deployment_id
        in: path
        schema:
          type: string
        required: true
      - in: query
        name: allow_active
        schema:
          type: boolean
          default: false
        required: false
      responses:
        '204':
          description: Deleted
    get:
      summary: Get deployment
      description: Get a deployment.
      operationId: deployments_get
      tags:
      - deployments
      parameters:
      - name: deployment_id
        in: path
        schema:
          type: string
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Deployment'
          description: Ok
    patch:
      summary: Update deployment
      description: Update a deployment.
      operationId: deployments_update
      tags:
      - deployments
      parameters:
      - name: deployment_id
        in: path
        schema:
          type: string
        required: true
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DeploymentUpdate'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Deployment'
          description: Updated
  /api/deployments/{deployment_id}/clusters:
    get:
      summary: Get deployment cluster history
      description: Get a list of clusters that the deployment has recently run on.
