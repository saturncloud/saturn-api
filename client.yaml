openapi: 3.0.2
components:
  schemas:
    RecipeType:
      type: string
      enum:
      - workspace
      - deployment
      - job
      - image
    Recipe:
      discriminator:
        propertyName: type
        mapping:
          deployment: '#/components/schemas/DeploymentRecipe'
          job: '#/components/schemas/JobRecipe'
          workspace: '#/components/schemas/WorkspaceRecipe'
          image: '#/components/schemas/ImageRecipe'
      oneOf:
      - $ref: '#/components/schemas/DeploymentRecipe'
      - $ref: '#/components/schemas/JobRecipe'
