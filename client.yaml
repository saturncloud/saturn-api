        required: true
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DaskClusterScale'
        required: true
      responses:
        '204':
          description: Ok
  /api/dask_clusters/{dask_cluster_id}/scheduler/runtimesummary:
    get:
      description: Get dask cluster scheduler runtime summary
      operationId: daskclusters_getSchedulerRuntimesummary
      tags:
