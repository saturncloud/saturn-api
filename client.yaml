      - $ref: '#/components/schemas/ImageRecipe'
      type: object
      properties:
        schema_version:
          type: string
          default: 2025.10.01
        type:
          $ref: '#/components/schemas/RecipeType'
      required:
      - type
    OwnerByName:
      type: object
      properties:
        name:
          type: string
          pattern: ^(?:(?P<org>[a-z\d](?:[a-z\d]|-(?=[a-z\d])){0,38})\/)?(?P<identity>[a-z\d](?:[a-z\d]|-(?=[a-z\d])){0,38})$
      required:
      - name
    OwnerById:
      type: object
      properties:
        id:
          type: string
      required:
      - id
    OwnerByIdentityId:
      type: object
      properties:
        user_id:
          type: string
          default: null
          nullable: true
        group_id:
          type: string
          default: null
          nullable: true
        org_id:
          type: string
          default: null
          nullable: true
    OwnerByPath:
      type: string
      pattern: ^(?:(?P<org>[a-z\d](?:[a-z\d]|-(?=[a-z\d])){0,38})\/)?(?P<identity>[a-z\d](?:[a-z\d]|-(?=[a-z\d])){0,38})$
    OwnerReference:
      oneOf:
      - $ref: '#/components/schemas/OwnerByName'
      - $ref: '#/components/schemas/OwnerById'
      - $ref: '#/components/schemas/OwnerByIdentityId'
      - $ref: '#/components/schemas/OwnerByPath'
    ImageTagById:
      type: object
      properties:
        tag_id:
          type: string
        enforce_trusted:
          type: boolean
          default: true
          writeOnly: true
      required:
      - tag_id
    ImageTagByUri:
      type: object
      properties:
        uri:
          type: string
        owner:
          $ref: '#/components/schemas/OwnerReference'
        enforce_trusted:
          type: boolean
          default: true
          writeOnly: true
      required:
      - uri
    ImageTagByName:
      type: object
      properties:
        name:
          type: string
        version:
          type: string
        owner:
          $ref: '#/components/schemas/OwnerReference'
        enforce_trusted:
          type: boolean
          default: true
          writeOnly: true
      required:
      - name
      - version
    ImageTagByPath:
      type: string
    ImageTagReference:
      anyOf:
      - $ref: '#/components/schemas/ImageTagById'
      - $ref: '#/components/schemas/ImageTagByUri'
      - $ref: '#/components/schemas/ImageTagByName'
      - $ref: '#/components/schemas/ImageTagByPath'
    ExtraPackagesRecipe:
      type: object
      properties:
        pip:
          type: object
          properties:
            install:
              type: string
            requirements_txt:
              type: string
        conda:
          type: object
          properties:
            install:
              type: string
            environment_yml:
              type: string
            use_mamba:
              type: boolean
              default: false
        apt:
          type: object
          properties:
            install:
              type: string
        cran:
          type: object
          properties:
            install:
              type: string
        remotes:
          type: object
          properties:
            install:
              type: string
        bioconductor:
          type: object
          properties:
            install:
              type: string
