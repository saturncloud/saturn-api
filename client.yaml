    get:
      summary: List object storage
      description: Paginated list of object storage.
      operationId: objectstorage_list
      tags:
      - object_storage
      parameters:
      - in: query
        name: owner_name
        description: Reference owner by name.
        schema:
          type: string
        required: false
      - in: query
        name: owner_id
        description: Reference owner by ID.
        schema:
          type: string
        required: false
      - in: query
        name: user_id
        description: Reference owner by user ID.
        schema:
          type: string
          default: null
          nullable: true
        required: false
      - in: query
        name: group_id
        description: Reference owner by group ID.
        schema:
          type: string
          default: null
          nullable: true
        required: false
      - in: query
        name: org_id
        description: Reference owner by org ID.
        schema:
          type: string
          default: null
          nullable: true
        required: false
      - in: query
        name: owner
        description: Reference owner by name.
        schema:
          type: string
          pattern: ^(?:(?P<org>[a-z\d](?:[a-z\d]|-(?=[a-z\d])){0,38})\/)?(?P<identity>[a-z\d](?:[a-z\d]|-(?=[a-z\d])){0,38})?$
        required: false
      - in: query
        name: prefix
        description: Prefix matched search string on object storage file path.
        schema:
          type: string
          default: ''
        required: false
