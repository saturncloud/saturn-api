info:
  description: The API for Saturn Cloud.
  title: Saturn Cloud
  version: 2025.04.01-1
servers: []
security:
- bearerAuth: []
paths:
  /api/auth/login:
    post:
      description: Login with username/password and set session cookie
      operationId: authorization_login
      tags:
      - authorization
      parameters:
      - in: query
        name: username
        schema:
          type: string
        required: true
      - in: query
        name: password
        schema:
          type: string
        required: true
      responses:
        '204':
          description: Ok
  /api/auth/logout:
    get:
      description: Logout from current session
      operationId: authorization_logout
      tags:
      - authorization
      parameters:
      - in: query
        name: username
        schema:
          type: string
        required: true
      - in: query
        name: password
        schema:
          type: string
        required: true
      responses:
        '302':
          description: Redirect
  /api/auth/token:
    get:
      description: Initialize oauth
      operationId: authorization_getOauthInit
      tags:
      - authorization
      parameters:
      - in: query
        name: response_type
        schema:
          type: string
          enum:
          - code
        required: true
      - in: query
        name: client_id
        schema:
          type: string
          enum:
          - saturn-auth-proxy
        required: true
      - in: query
        name: code_challenge
        schema:
          type: string
        required: true
      - in: query
        name: code_challenge_method
        schema:
          type: string
          default: plain
          enum:
          - plain
          - S256
        required: false
      - in: query
        name: redirect_uri
        schema:
          type: string
        required: true
      - in: query
        name: state
        schema:
          type: string
        required: false
      responses:
        '302':
          description: Redirect
    post:
      description: Request new auth tokens from oauth code or refresh token grant
      operationId: authorization_createOauthToken
      tags:
      - authorization
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuthorizationGrant'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthorizationTokenResponse'
          description: Created
  /api/dask_clusters:
    get:
      description: List dask clusters for a user or group
      operationId: daskclusters_list
      tags:
      - dask_clusters
      parameters:
      - in: query
        name: owner_id
        schema:
          type: string
          writeOnly: true
        required: false
      - in: query
        name: owner_name
        schema:
          type: string
          writeOnly: true
          pattern: ^(?:(?P<org>[a-z\d](?:[a-z\d]|-(?=[a-z\d])){0,38})\/)?(?P<identity>[a-z\d](?:[a-z\d]|-(?=[a-z\d])){0,38})$
        required: false
      - in: query
        name: user_id
        schema:
          type: string
          writeOnly: true
          nullable: true
        required: false
      - in: query
        name: group_id
        schema:
          type: string
          writeOnly: true
          nullable: true
        required: false
      - in: query
        name: org_id
        schema:
          type: string
          writeOnly: true
        required: false
      - in: query
        name: include_groups
        schema:
          type: boolean
          default: true
        required: false
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DaskClusterList'
          description: Ok
    post:
      description: Create a dask cluster
      operationId: daskclusters_create
      tags:
      - dask_clusters
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DaskClusterCreate'
        required: true
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DaskCluster'
          description: Created
  /api/dask_clusters/{dask_cluster_id}:
    delete:
      description: Delete dask cluster by ID
      operationId: daskclusters_delete
      tags:
      - dask_clusters
      parameters:
      - name: dask_cluster_id
        in: path
        schema:
          type: string
        required: true
      responses:
        '204':
          description: Deleted
    get:
      description: Get dask cluster by ID
      operationId: daskclusters_get
      tags:
      - dask_clusters
      parameters:
      - name: dask_cluster_id
        in: path
        schema:
          type: string
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DaskCluster'
          description: Ok
    patch:
      description: Update dask cluster by ID
      operationId: daskclusters_update
      tags:
      - dask_clusters
      parameters:
      - name: dask_cluster_id
        in: path
        schema:
          type: string
        required: true
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DaskClusterUpdate'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DaskCluster'
          description: Updated
  /api/dask_clusters/{dask_cluster_id}/adapt:
    post:
      description: Set adaptive scaling on a dask cluster
      operationId: daskclusters_adapt
      tags:
      - dask_clusters
      parameters:
      - name: dask_cluster_id
        in: path
        schema:
          type: string
        required: true
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DaskClusterAdapt'
        required: true
      responses:
        '204':
          description: Ok
  /api/dask_clusters/{dask_cluster_id}/close:
    post:
      description: Stop dask cluster by ID
      operationId: daskclusters_stop
      tags:
      - dask_clusters
      parameters:
      - name: dask_cluster_id
        in: path
        schema:
          type: string
        required: true
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DaskCluster'
          description: Stopped
  /api/dask_clusters/{dask_cluster_id}/history:
    get:
      description: Get dask cluster status history
      operationId: daskclusters_getStatusHistory
      tags:
      - dask_clusters
      parameters:
      - name: dask_cluster_id
        in: path
        schema:
          type: string
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResourceHistory'
          description: Ok
  /api/dask_clusters/{dask_cluster_id}/info:
    get:
      description: Passthrough to dask's /info route
      operationId: daskclusters_getInfo
      tags:
      - dask_clusters
      parameters:
      - name: dask_cluster_id
        in: path
        schema:
          type: string
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
          description: Ok
  /api/dask_clusters/{dask_cluster_id}/kubecluster/runtimesummary:
    get:
      description: Get dask kubecluster runtime summary
      operationId: daskclusters_kubeclusterRuntimeSummary
      tags:
      - dask_clusters
      parameters:
      - name: dask_cluster_id
        in: path
        required: true
        schema:
          type: string
      - in: query
        name: details
        schema:
          type: boolean
          default: false
        required: false
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeploymentRuntimeSummary'
          description: Ok
  /api/dask_clusters/{dask_cluster_id}/logs:
    get:
      description: Get dask cluster historical logs
      operationId: daskclusters_getLogHistory
      tags:
      - dask_clusters
      parameters:
      - name: dask_cluster_id
        in: path
        schema:
          type: string
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HistoricLogs'
          description: Ok
  /api/dask_clusters/{dask_cluster_id}/metrics:
    get:
      description: Get dask cluster hardware metrics
      operationId: daskclusters_getMetrics
      tags:
      - dask_clusters
      parameters:
      - name: dask_cluster_id
        in: path
        required: true
        schema:
          type: string
      - in: query
        name: type
        schema:
          type: string
          nullable: true
        required: false
      - in: query
        name: start
        schema:
          type: string
          format: date-time
          nullable: true
        required: false
      - in: query
        name: end
        schema:
          type: string
          format: date-time
          nullable: true
        required: false
      - in: query
        name: resolution
        schema:
          type: string
          nullable: true
        required: false
      - in: query
        name: cluster
        schema:
          type: string
          nullable: true
        required: false
      - in: query
        name: component
        schema:
          type: string
          nullable: true
        required: false
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Metrics'
          description: Ok
  /api/dask_clusters/{dask_cluster_id}/restart:
    post:
      description: Restart dask cluster by ID
      operationId: daskclusters_restart
      tags:
      - dask_clusters
      parameters:
      - name: dask_cluster_id
        in: path
        schema:
          type: string
        required: true
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DaskCluster'
          description: Restarted
  /api/dask_clusters/{dask_cluster_id}/runtimesummary:
    get:
      description: Get dask cluster runtime summary
      operationId: daskclusters_getRuntimeSummary
      tags:
      - dask_clusters
      parameters:
      - name: dask_cluster_id
        in: path
        schema:
          type: string
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DaskClusterRuntimeSummary'
          description: Ok
  /api/dask_clusters/{dask_cluster_id}/scale:
    post:
      description: Scale dask cluster workers to desired count
      operationId: daskclusters_scale
      tags:
      - dask_clusters
      parameters:
      - name: dask_cluster_id
        in: path
        schema:
          type: string
        required: true
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DaskClusterScale'
        required: true
      responses:
        '204':
          description: Ok
  /api/dask_clusters/{dask_cluster_id}/scheduler/runtimesummary:
    get:
      description: Get dask scheduler runtime summary
      operationId: daskclusters_scheduler_runtimesummary
      tags:
      - dask_clusters
      parameters:
      - name: dask_cluster_id
        in: path
        required: true
        schema:
          type: string
      - in: query
        name: details
        schema:
          type: boolean
          default: false
        required: false
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PodRuntimeSummary'
          description: Ok
  /api/dask_clusters/{dask_cluster_id}/scheduler_info:
    get:
      description: Passthrough to dask's /scheduler_info route
      operationId: daskclusters_getSchedulerInfo
      tags:
      - dask_clusters
      parameters:
      - name: dask_cluster_id
        in: path
        schema:
          type: string
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
          description: Ok
  /api/dask_clusters/{dask_cluster_id}/start:
    post:
      description: Start dask cluster by ID
      operationId: daskclusters_start
      tags:
      - dask_clusters
      parameters:
      - name: dask_cluster_id
        in: path
        schema:
          type: string
        required: true
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DaskCluster'
          description: Started
  /api/dask_clusters/{dask_cluster_id}/status:
    get:
      description: Passthrough to dask's /status route
      operationId: daskclusters_getSchedulerStatus
      tags:
      - dask_clusters
      parameters:
      - name: dask_cluster_id
        in: path
        schema:
          type: string
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
          description: Ok
  /api/dask_clusters/{dask_cluster_id}/token:
    get:
      description: Get dask cluster resource API token info
      operationId: daskclusters_getTokenInfo
      tags:
      - dask_clusters
      parameters:
      - name: dask_cluster_id
        in: path
        required: true
        schema:
          type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResourceTokenInfo'
          description: Ok
    patch:
      description: Update and rotate dask cluster resource API token. Invalidates
        existing token.
      operationId: daskclusters_updateToken
      tags:
      - dask_clusters
      parameters:
      - name: dask_cluster_id
        in: path
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResourceTokenUpdate'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResourceTokenInfo'
          description: Ok
    post:
      description: Rotate dask cluster resource API token. Invalidates existing token.
      operationId: daskclusters_rotateToken
      tags:
      - dask_clusters
      parameters:
      - name: dask_cluster_id
        in: path
        required: true
        schema:
          type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResourceTokenInfo'
          description: Ok
  /api/dask_clusters/{dask_cluster_id}/workers/runtimesummary:
    get:
      description: List dask worker runtime summaries
      operationId: daskclusters_workers_runtimesummary
      tags:
      - dask_clusters
      parameters:
      - name: dask_cluster_id
        in: path
        required: true
        schema:
          type: string
      - in: query
        name: page
        schema:
          type: integer
          default: 1
          minimum: 1
        required: false
      - in: query
        name: page_size
        schema:
          type: integer
          default: 100
          maximum: 1000
        required: false
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DaskWorkersRuntimeSummaryPage'
          description: Ok
  /api/dask_clusters/info:
    get:
      description: Get server options for dask workers and schedulers
      operationId: daskclusters_getServerInfo
      tags:
      - dask_clusters
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DaskClusterServerOptions'
          description: Ok
  /api/deployments:
    get:
      description: List deployments for a user or group
      operationId: deployments_list
      tags:
      - deployments
      parameters:
      - in: query
        name: owner_id
        schema:
          type: string
          writeOnly: true
        required: false
      - in: query
        name: owner_name
        schema:
          type: string
          writeOnly: true
          pattern: ^(?:(?P<org>[a-z\d](?:[a-z\d]|-(?=[a-z\d])){0,38})\/)?(?P<identity>[a-z\d](?:[a-z\d]|-(?=[a-z\d])){0,38})$
        required: false
      - in: query
        name: user_id
        schema:
          type: string
          writeOnly: true
          nullable: true
        required: false
      - in: query
        name: group_id
        schema:
          type: string
          writeOnly: true
          nullable: true
        required: false
      - in: query
        name: org_id
        schema:
          type: string
          writeOnly: true
        required: false
      - in: query
        name: include_groups
        schema:
          type: boolean
          default: true
        required: false
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DepoloymentsList'
          description: Ok
    post:
      description: Create deployment
      operationId: deployments_create
      tags:
      - deployments
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DeploymentCreate'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Deployment'
          description: Created
  /api/deployments/{deployment_id}:
    delete:
      description: Delete deployment by ID
      operationId: deployments_delete
      tags:
      - deployments
      parameters:
      - name: deployment_id
        in: path
        schema:
          type: string
        required: true
      responses:
        '204':
          description: Deleted
    get:
      description: Get deployment by ID
      operationId: deployments_get
      tags:
      - deployments
      parameters:
      - name: deployment_id
        in: path
        schema:
          type: string
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Deployment'
          description: Ok
    patch:
      description: Update deployment by ID
      operationId: deployments_update
      tags:
      - deployments
      parameters:
      - name: deployment_id
        in: path
        schema:
          type: string
        required: true
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DeploymentUpdate'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Deployment'
          description: Updated
  /api/deployments/{deployment_id}/clusters:
    get:
      description: Get the names of clusters that a deployment has run on
      operationId: deployments_getClusterHistory
      tags:
      - deployments
      parameters:
      - name: deployment_id
        in: path
        schema:
          type: string
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResourceClusters'
          description: Ok
  /api/deployments/{deployment_id}/history:
    get:
      description: Get deployment status history
      operationId: deployments_getStatusHistory
      tags:
      - deployments
      parameters:
      - name: deployment_id
        in: path
        schema:
          type: string
        required: true
      - in: query
        name: cluster
        schema:
          type: string
          nullable: true
        required: false
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResourceHistory'
          description: Ok
  /api/deployments/{deployment_id}/logs:
    get:
      description: Get deployment historical logs
      operationId: deployments_getLogHistory
      tags:
      - deployments
      parameters:
      - name: deployment_id
        in: path
        schema:
          type: string
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HistoricLogs'
          description: Ok
  /api/deployments/{deployment_id}/metrics:
    get:
      description: Get deployment hardware metrics
      operationId: deployments_getMetrics
      tags:
      - deployments
      parameters:
      - name: deployment_id
        in: path
        schema:
          type: string
        required: true
      - in: query
        name: type
        schema:
          type: string
          nullable: true
        required: false
      - in: query
        name: start
        schema:
          type: string
          format: date-time
          nullable: true
        required: false
      - in: query
        name: end
        schema:
          type: string
          format: date-time
          nullable: true
        required: false
      - in: query
        name: resolution
        schema:
          type: string
          nullable: true
        required: false
      - in: query
        name: cluster
        schema:
          type: string
          nullable: true
        required: false
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Metrics'
          description: Ok
  /api/deployments/{deployment_id}/restart:
    post:
      description: Restart deployment
      operationId: deployments_restart
      tags:
      - deployments
      parameters:
      - name: deployment_id
        in: path
        schema:
          type: string
        required: true
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DeploymentStart'
        required: false
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Deployment'
          description: Restarted
  /api/deployments/{deployment_id}/routes:
    get:
      description: List deployment routes
      operationId: deployments_listRoutes
      tags:
      - deployments
      parameters:
      - name: deployment_id
        in: path
        schema:
          type: string
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RoutesList'
          description: Ok
    post:
      description: Create deployment route
      operationId: deployments_createRoute
      tags:
      - deployments
      parameters:
      - name: deployment_id
        in: path
        schema:
          type: string
        required: true
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RouteCreate'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Route'
          description: Created
  /api/deployments/{deployment_id}/routes/{route_id}:
    delete:
      description: Delete deployment route
      operationId: deployments_deleteRoute
      tags:
      - deployments
      parameters:
      - name: deployment_id
        in: path
        schema:
          type: string
        required: true
      - name: route_id
        in: path
        schema:
          type: string
        required: true
      responses:
        '204':
          description: Deleted
    put:
      description: Update deployment route
      operationId: deployments_updateRoute
      tags:
      - deployments
      parameters:
      - name: deployment_id
        in: path
        schema:
          type: string
        required: true
      - name: route_id
        in: path
        schema:
          type: string
        required: true
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RouteUpdate'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Route'
          description: Updated
  /api/deployments/{deployment_id}/runtimesummary:
    get:
      description: Get deployment runtime summary
      operationId: deployments_getRuntimeSummary
      tags:
      - deployments
      parameters:
      - name: deployment_id
        in: path
        schema:
          type: string
        required: true
      - in: query
        name: details
        schema:
          type: boolean
          default: false
        required: false
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeploymentRuntimeSummary'
          description: Ok
  /api/deployments/{deployment_id}/service_account:
    delete:
      description: Delete deployment service account attachment
      operationId: deployments_deleteServiceAccountAttachment
      tags:
      - deployments
      parameters:
      - name: deployment_id
        in: path
        schema:
          type: string
        required: true
      responses:
        '204':
          description: Deleted
    get:
      description: Get deployment service account attachment
      operationId: deployments_getServiceAccountAttachment
      tags:
      - deployments
      parameters:
      - name: deployment_id
        in: path
        schema:
          type: string
        required: true
      responses:
        '200':
          content:
