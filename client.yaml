openapi: 3.0.3
components:
  schemas:
    Recipe:
      discriminator:
        propertyName: type
        mapping:
          deployment: '#/components/schemas/DeploymentRecipe'
          job: '#/components/schemas/JobRecipe'
          workspace: '#/components/schemas/WorkspaceRecipe'
          image: '#/components/schemas/ImageRecipe'
      oneOf:
      - $ref: '#/components/schemas/DeploymentRecipe'
      - $ref: '#/components/schemas/JobRecipe'
      - $ref: '#/components/schemas/WorkspaceRecipe'
      - $ref: '#/components/schemas/ImageRecipe'
      type: object
      properties: {}
    OwnerByName:
      type: object
      properties:
        name:
          type: string
      required:
      - name
    OwnerById:
      type: object
      properties:
        id:
          type: string
      required:
      - id
    OwnerByIdentityId:
      type: object
      properties:
        user_id:
          type: string
          default: null
          nullable: true
        group_id:
          type: string
          default: null
          nullable: true
        org_id:
          type: string
          default: null
