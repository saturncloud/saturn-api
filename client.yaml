          readOnly: true
        size_display:
          type: string
          readOnly: true
        k8s_name:
          type: string
          readOnly: true
        require_restart:
          type: boolean
          readOnly: true
        created_at:
          type: string
          format: '%Y-%m-%dT%H:%M:%S+00:00'
          readOnly: true
        updated_at:
          type: string
          format: '%Y-%m-%dT%H:%M:%S+00:00'
          readOnly: true
        started_at:
          type: string
          format: '%Y-%m-%dT%H:%M:%S+00:00'
          readOnly: true
        self_destruct:
          type: boolean
      required:
      - name
    Deployment:
      type: object
      properties:
        owner_id:
          type: string
          writeOnly: true
        owner_name:
          type: string
          writeOnly: true
          pattern: ^(?:(?P<org>[a-z\d](?:[a-z\d]|-(?=[a-z\d])){0,38})\/)?(?P<identity>[a-z\d](?:[a-z\d]|-(?=[a-z\d])){0,38})$
        user_id:
          type: string
          writeOnly: true
          nullable: true
        group_id:
          type: string
          writeOnly: true
          nullable: true
        org_id:
          type: string
          writeOnly: true
        owner:
          readOnly: true
          allOf:
          - $ref: '#/components/schemas/Owner'
        id:
          type: string
          readOnly: true
        name:
          type: string
          readOnly: true
        command:
          type: string
          readOnly: true
          minLength: 1
        description:
          type: string
          readOnly: true
          maxLength: 2048
        instance_size:
          type: string
          readOnly: true
        extra_packages:
          readOnly: true
          allOf:
          - $ref: '#/components/schemas/ExtraPackages'
        scale:
          type: integer
          readOnly: true
          minimum: 1
        start_script:
          type: string
          readOnly: true
          nullable: true
        environment_variables:
          type: object
          readOnly: true
          additionalProperties:
            type: string
        working_dir:
          type: string
          readOnly: true
        start_ssh:
          type: boolean
          readOnly: true
        is_spot:
          type: boolean
          readOnly: true
        healthcheck:
          type: string
          readOnly: true
          nullable: true
        subdomain:
          type: string
          readOnly: true
        start_dind:
          type: boolean
          readOnly: true
        image_tag:
          readOnly: true
