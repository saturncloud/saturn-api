      parameters:
      - name: dask_cluster_id
        in: path
        schema:
          type: string
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
          description: Ok
  /api/dask_clusters/{dask_cluster_id}/start:
    post:
      description: Start dask cluster
      operationId: daskclusters_start
      tags:
      - dask_clusters
      parameters:
      - name: dask_cluster_id
        in: path
        schema:
          type: string
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DaskCluster'
          description: Started
  /api/dask_clusters/{dask_cluster_id}/status:
    get:
      description: Get dask cluster scheduler status
      operationId: daskclusters_getSchedulerStatus
      tags:
      - dask_clusters
      parameters:
      - name: dask_cluster_id
        in: path
        schema:
          type: string
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
