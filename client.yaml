                $ref: '#/components/schemas/DeploymentList'
          description: Ok
    post:
      description: Create deployment
      operationId: deployments_create
      tags:
      - deployments
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DeploymentCreate'
        required: true
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Deployment'
          description: Created
  /api/deployments/{deployment_id}:
