          nullable: true
        required: false
      - in: query
        name: group_id
        schema:
          type: string
          default: null
          nullable: true
        required: false
      - in: query
        name: org_id
        schema:
          type: string
          default: null
          nullable: true
        required: false
      - in: query
        name: owner
        schema:
          type: string
          pattern: ^(?:(?P<org>[a-z\d](?:[a-z\d]|-(?=[a-z\d])){0,38})\/)?(?P<identity>[a-z\d](?:[a-z\d]|-(?=[a-z\d])){0,38})$
