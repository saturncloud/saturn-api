          description: Ok
  /api/dask_clusters/{dask_cluster_id}/stop:
    post:
      description: Stop dask cluster
      operationId: daskclusters_stop
      tags:
      - dask_clusters
      parameters:
      - name: dask_cluster_id
        in: path
        schema:
          type: string
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DaskCluster'
          description: Stopped
  /api/dask_clusters/{dask_cluster_id}/token:
    get:
      description: Get dask cluster resource API token info
      operationId: daskclusters_getTokenInfo
      tags:
      - dask_clusters
      parameters:
      - name: dask_cluster_id
        in: path
        schema:
          type: string
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResourceTokenInfo'
          description: Ok
    patch:
      description: Update and rotate dask cluster resource API token. Invalidates
        existing token.
      operationId: daskclusters_updateToken
      tags:
      - dask_clusters
      parameters:
      - name: dask_cluster_id
        in: path
        schema:
          type: string
        required: true
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResourceTokenUpdate'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResourceTokenInfo'
          description: Updated
    post:
      description: Rotate dask cluster resource API token. Invalidates existing token.
      operationId: daskclusters_rotateToken
      tags:
      - dask_clusters
      parameters:
      - name: dask_cluster_id
        in: path
        schema:
          type: string
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResourceTokenInfo'
          description: Rotated
