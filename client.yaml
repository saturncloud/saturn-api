info:
  description: The API for Saturn Cloud.
  title: Saturn Cloud
  version: 2026.02.01
servers: []
security:
- bearerAuth: []
paths:
  /api/active/pods:
    get:
      summary: List pod runtime summaries
      operationId: active_listPods
      tags:
      - active
      parameters:
      - in: query
        name: workload_type
        description: Type of pods to query.
        schema:
          $ref: '#/components/schemas/WorkloadType'
        required: true
      - in: query
        name: workload_id
        description: ID of the workload.
        schema:
          type: string
        required: true
      - in: query
        name: cluster
        description: Name of the cluster to query.
        schema:
          type: string
        required: false
      - in: query
        name: prev_key
        description: Previous page key.
        schema:
          type: string
        required: false
      - in: query
        name: next_key
        description: Next page key.
        schema:
          type: string
        required: false
      - in: query
        name: page_size
        description: Maximum number of results per page.
        schema:
          type: integer
          default: 100
          minimum: 1
          maximum: 1000
        required: false
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PodRuntimeSummaryList'
          description: Ok
  /api/active/pods/{name}:
    get:
      summary: Get pod runtime summary
      operationId: active_getPod
      tags:
      - active
      parameters:
      - in: path
        name: name
        schema:
          type: string
        required: true
      - in: query
        name: cluster
        schema:
          type: string
        required: false
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PodRuntimeSummary'
          description: Ok
  /api/active/pods/{name}/logs:
    get:
      summary: Get pod logs
      operationId: active_getPodLogs
      tags:
      - active
      parameters:
      - in: path
        name: name
        schema:
          type: string
        required: true
      - in: query
        name: container_name
        description: Name of the container to retrieve logs for. Defaults to first
          container in the pod.
        schema:
          type: string
        required: false
      - in: query
        name: previous
        description: Retrieve logs for the previous instance of a container, if it
          exists.
        schema:
          type: boolean
          default: false
        required: false
      - in: query
        name: cluster
        description: Name of the cluster where the pod is running.
        schema:
          type: string
        required: false
      - in: query
        name: page_size
        description: Number of log lines to retrieve.
        schema:
          type: integer
          default: 1000
          minimum: 1
          maximum: 5000
        required: false
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PodLogs'
          description: Ok
  /api/active/resources:
    get:
      summary: List active resources
      operationId: active_listResources
      tags:
      - active
      parameters:
      - in: query
        name: user_id
        description: Reference owner by user ID.
        schema:
          type: string
          default: null
          nullable: true
        required: false
      - in: query
        name: group_id
        description: Reference owner by group ID.
        schema:
          type: string
          default: null
          nullable: true
        required: false
      - in: query
        name: org_id
        description: Reference owner by org ID.
        schema:
          type: string
          default: null
          nullable: true
        required: false
      - in: query
        name: resource_type
        description: Filter the type of returned resources.
        schema:
          $ref: '#/components/schemas/ResourceType'
        required: false
      - in: query
        name: list_by
        description: List active resources at the owner, org, or account level. Org
          and Account require elevated permissions.
        schema:
          type: string
          default: owner
          enum:
          - owner
          - org
          - account
        required: false
      - in: query
        name: prev_key
        description: Previous page key.
        schema:
          type: string
        required: false
      - in: query
        name: next_key
        description: Next page key.
        schema:
          type: string
        required: false
      - in: query
        name: page_size
        description: Maximum number of results per page.
        schema:
          type: integer
          default: 100
          minimum: 1
          maximum: 1000
        required: false
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ActiveResourceList'
          description: Ok
  /api/auth/login:
    post:
      summary: Login
      description: Create a new browser session.
      operationId: authorization_login
      tags:
      - authorization
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Login'
      responses:
        '204':
          description: Ok
  /api/auth/logout:
    get:
      summary: Logout
      description: End the current browser session.
      operationId: authorization_logout
      tags:
      - authorization
      responses:
        '302':
          description: Redirect
  /api/auth/token:
    get:
      summary: Initialize oauth
      description: Begin an OAuth code grant flow.
      operationId: authorization_getOauthInit
      tags:
      - authorization
      parameters:
      - in: query
        name: response_type
        description: OAuth response type. Only 'code' is supported.
        schema:
          type: string
          enum:
          - code
        required: true
      - in: query
        name: client_id
        description: Saturn OAuth client ID
        schema:
          type: string
          enum:
          - saturn-auth-proxy
        required: true
      - in: query
        name: code_challenge
        description: OAuth code challenge.
        schema:
          type: string
        required: true
      - in: query
        name: code_challenge_method
        description: OAuth code challenge method.
        schema:
          type: string
          default: plain
          enum:
          - plain
          - S256
        required: false
      - in: query
        name: redirect_uri
        description: URI for redirect with code challenge response.
        schema:
          type: string
        required: true
      - in: query
        name: state
        description: OAuth code challenge state.
        schema:
          type: string
        required: false
      responses:
        '302':
          description: Redirect
    post:
      summary: Create OAuth token
      description: Request new token from oauth code or refresh token grant.
      operationId: authorization_createOauthToken
      tags:
      - authorization
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuthorizationGrant'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthorizationTokenResponse'
          description: Created
  /api/dask_clusters:
    get:
      summary: List dask clusters
      description: Paginated list of dask clusters.
      operationId: daskclusters_list
      tags:
      - dask_clusters
      parameters:
      - in: query
        name: owner_name
        description: Reference owner by name.
        schema:
          type: string
        required: false
      - in: query
        name: owner_id
        description: Reference owner by ID.
        schema:
          type: string
        required: false
      - in: query
        name: user_id
        description: Reference owner by user ID.
        schema:
          type: string
          default: null
          nullable: true
        required: false
      - in: query
        name: group_id
        description: Reference owner by group ID.
        schema:
          type: string
          default: null
          nullable: true
        required: false
      - in: query
        name: org_id
        description: Reference owner by org ID.
        schema:
          type: string
          default: null
          nullable: true
        required: false
      - in: query
        name: owner
        description: Reference owner by name.
        schema:
          type: string
          pattern: ^(?:(?P<org>[a-z\d](?:[a-z\d]|-(?=[a-z\d])){0,38})\/)?(?P<identity>[a-z\d](?:[a-z\d]|-(?=[a-z\d])){0,38})?$
        required: false
      - in: query
        name: prev_key
        description: Previous page key.
        schema:
          type: string
        required: false
      - in: query
        name: next_key
        description: Next page key.
        schema:
          type: string
        required: false
      - in: query
        name: page_size
        description: Page size.
        schema:
          type: integer
          default: 100
          minimum: 1
          maximum: 1000
        required: false
      - in: query
        name: descending
        description: List results in descending order.
        schema:
          type: boolean
          default: false
        required: false
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DaskClusterList'
          description: Ok
    post:
      summary: Create dask cluster
      description: Create a new dask cluster.
      operationId: daskclusters_create
      tags:
      - dask_clusters
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DaskClusterCreate'
        required: true
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DaskCluster'
          description: Created
  /api/dask_clusters/{dask_cluster_id}:
    delete:
      summary: Delete dask cluster
      description: Delete a dask cluster.
      operationId: daskclusters_delete
      tags:
      - dask_clusters
      parameters:
      - name: dask_cluster_id
        in: path
        schema:
          type: string
        required: true
      - in: query
        name: allow_active
        description: Force delete dask cluster that is currently active.
        schema:
          type: boolean
          default: false
        required: false
      responses:
        '204':
          description: Deleted
    get:
      summary: Get dask cluster
      description: Get a dask cluster.
      operationId: daskclusters_get
      tags:
      - dask_clusters
      parameters:
      - name: dask_cluster_id
        in: path
        schema:
          type: string
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DaskCluster'
          description: Ok
    patch:
      summary: Update dask cluster
      description: Update a dask cluster.
      operationId: daskclusters_update
      tags:
      - dask_clusters
      parameters:
      - name: dask_cluster_id
        in: path
        schema:
          type: string
        required: true
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DaskClusterUpdate'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DaskCluster'
          description: Updated
  /api/dask_clusters/{dask_cluster_id}/adapt:
    post:
      summary: Set dask cluster adaptive scaling
      operationId: daskclusters_adapt
      tags:
      - dask_clusters
      parameters:
      - name: dask_cluster_id
        in: path
        schema:
          type: string
        required: true
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DaskClusterAdapt'
        required: true
      responses:
        '204':
          description: Ok
  /api/dask_clusters/{dask_cluster_id}/history:
    get:
      summary: Get dask cluster pod history
      description: Get history of pods run for the dask cluster.
      operationId: daskclusters_getPodHistory
      tags:
      - dask_clusters
      parameters:
      - name: dask_cluster_id
        in: path
        schema:
          type: string
        required: true
      - in: query
        name: component
        description: Dask component to query.
        schema:
          $ref: '#/components/schemas/DaskComponents'
        required: false
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResourceHistory'
          description: Ok
  /api/dask_clusters/{dask_cluster_id}/info:
    get:
      summary: Get dask cluster info
      operationId: daskclusters_getInfo
      tags:
      - dask_clusters
      parameters:
      - name: dask_cluster_id
        in: path
        schema:
          type: string
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
          description: Ok
  /api/dask_clusters/{dask_cluster_id}/kubecluster/runtimesummary:
    get:
      summary: Get dask cluster kubecluster runtime summary
      description: Summary of the current runtime status.
      operationId: daskclusters_getKubeclusterRuntimeSummary
      tags:
      - dask_clusters
      parameters:
      - name: dask_cluster_id
        in: path
        schema:
          type: string
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeploymentRuntimeSummary'
          description: Ok
  /api/dask_clusters/{dask_cluster_id}/logs:
    get:
      summary: Get dask cluster historical logs
      description: Historical record of logs from the resource.
      operationId: daskclusters_getLogs
      tags:
      - dask_clusters
      parameters:
      - name: dask_cluster_id
        in: path
        schema:
          type: string
        required: true
      - in: query
        name: pod_name
        description: Name of the pod to retrieve logs from.
        schema:
          type: string
        required: false
      - in: query
        name: cluster
        description: Name of the cluster the pod lives in.
        schema:
          type: string
        required: false
      - in: query
        name: prev_key
        description: Previous page key.
        schema:
          type: string
        required: false
      - in: query
        name: next_key
        description: Next page key.
        schema:
          type: string
        required: false
      - in: query
        name: page_size
        description: Maximum number of results per page.
        schema:
          type: integer
          default: 100
          minimum: 1
          maximum: 1000
        required: false
      - in: query
        name: component
        description: Dask component to query.
        schema:
          $ref: '#/components/schemas/DaskComponents'
        required: false
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HistoricLogList'
          description: Ok
  /api/dask_clusters/{dask_cluster_id}/metrics:
    get:
      summary: Get dask cluster metrics
      description: Hardware utilization metrics.
      operationId: daskclusters_getMetrics
      tags:
      - dask_clusters
      parameters:
      - name: dask_cluster_id
        in: path
        schema:
          type: string
        required: true
      - in: query
        name: component
        description: Dask component to query.
        schema:
          $ref: '#/components/schemas/DaskComponents'
        required: false
      - in: query
        name: type
        description: Filter metric series by type.
        schema:
          type: string
        required: false
      - in: query
        name: start
        description: Start timestamp of the metrics query.
        schema:
          type: string
          format: date-time
        required: false
      - in: query
        name: end
        description: End timestamp of the metrics query.
        schema:
          type: string
          format: date-time
        required: false
      - in: query
        name: resolution
        description: Sampling resolution of metrics points.
        schema:
          type: string
        required: false
      - in: query
        name: cluster
        description: Cluster to query for metrics.
        schema:
          type: string
        required: false
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Metrics'
          description: Ok
  /api/dask_clusters/{dask_cluster_id}/restart:
    post:
      summary: Restart dask cluster
      description: Restart a running dask cluster.
      operationId: daskclusters_restart
      tags:
      - dask_clusters
      parameters:
      - name: dask_cluster_id
        in: path
        schema:
          type: string
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DaskCluster'
          description: Restarted
  /api/dask_clusters/{dask_cluster_id}/runtimesummary:
    get:
      summary: Get dask cluster runtime summary
      description: Summary of the current runtime status.
      operationId: daskclusters_getRuntimeSummary
      tags:
      - dask_clusters
      parameters:
      - name: dask_cluster_id
        in: path
        schema:
          type: string
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DaskClusterRuntimeSummary'
          description: Ok
  /api/dask_clusters/{dask_cluster_id}/scale:
    post:
      summary: Scale dask cluster worker count
      operationId: daskclusters_scale
      tags:
      - dask_clusters
      parameters:
      - name: dask_cluster_id
        in: path
        schema:
          type: string
        required: true
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DaskClusterScale'
        required: true
      responses:
        '204':
          description: Ok
  /api/dask_clusters/{dask_cluster_id}/scheduler/runtimesummary:
    get:
      summary: Get dask cluster scheduler runtime summary
      description: Summary of the current runtime status.
      operationId: daskclusters_getSchedulerRuntimesummary
      tags:
      - dask_clusters
      parameters:
      - name: dask_cluster_id
        in: path
        schema:
          type: string
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PodRuntimeSummary'
          description: Ok
  /api/dask_clusters/{dask_cluster_id}/scheduler_info:
    get:
      summary: Get dask cluster scheduler info
      operationId: daskclusters_getSchedulerInfo
      tags:
      - dask_clusters
      parameters:
      - name: dask_cluster_id
        in: path
        schema:
          type: string
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
          description: Ok
  /api/dask_clusters/{dask_cluster_id}/start:
    post:
      summary: Start dask cluster
      description: Run a dask cluster.
      operationId: daskclusters_start
      tags:
      - dask_clusters
      parameters:
      - name: dask_cluster_id
        in: path
        schema:
          type: string
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DaskCluster'
          description: Started
  /api/dask_clusters/{dask_cluster_id}/status:
    get:
      summary: Get dask cluster scheduler status
      operationId: daskclusters_getSchedulerStatus
      tags:
      - dask_clusters
      parameters:
      - name: dask_cluster_id
        in: path
        schema:
          type: string
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
          description: Ok
  /api/dask_clusters/{dask_cluster_id}/stop:
    post:
      summary: Stop dask cluster
      description: Stop a running dask cluster.
      operationId: daskclusters_stop
      tags:
      - dask_clusters
      parameters:
      - name: dask_cluster_id
        in: path
        schema:
          type: string
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DaskCluster'
          description: Stopped
  /api/dask_clusters/{dask_cluster_id}/token:
    get:
      summary: Get dask cluster API token info
      operationId: daskclusters_getTokenInfo
      tags:
      - dask_clusters
      parameters:
      - name: dask_cluster_id
        in: path
        schema:
          type: string
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResourceTokenInfo'
          description: Ok
    patch:
      summary: Update dask cluster API token
      description: Update API token scope on the dask cluster. Invalidates existing
        tokens.
      operationId: daskclusters_updateToken
      tags:
      - dask_clusters
      parameters:
      - name: dask_cluster_id
        in: path
        schema:
          type: string
        required: true
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResourceTokenUpdate'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResourceTokenInfo'
          description: Updated
    post:
      summary: Rotate dask cluster API token
      description: Invalidate existing API tokens for the dask cluster.
      operationId: daskclusters_rotateToken
      tags:
      - dask_clusters
      parameters:
      - name: dask_cluster_id
        in: path
        schema:
          type: string
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResourceTokenInfo'
          description: Rotated
  /api/dask_clusters/{dask_cluster_id}/workers/runtimesummary:
    get:
      summary: List dask cluster worker runtime summaries
      operationId: daskclusters_listWorkerRuntimeSummaries
      tags:
      - dask_clusters
      parameters:
      - name: dask_cluster_id
        in: path
        schema:
          type: string
        required: true
      - in: query
        name: prev_key
        description: Previous page key.
        schema:
          type: string
        required: false
      - in: query
        name: next_key
        description: Next page key.
        schema:
          type: string
        required: false
      - in: query
        name: page_size
        description: Maximum number of results per page.
        schema:
          type: integer
          default: 100
          minimum: 1
          maximum: 1000
        required: false
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DaskWorkerRuntimeSummaryList'
          description: Ok
  /api/dask_clusters/info:
    get:
      summary: Get dask cluster server options
      operationId: daskclusters_getServerOptions
      tags:
      - dask_clusters
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DaskClusterServerOptions'
          description: Ok
  /api/deployments:
    get:
      summary: List deployments
      description: Paginated list of deployments.
      operationId: deployments_list
      tags:
      - deployments
      parameters:
      - in: query
        name: owner_name
        description: Reference owner by name.
        schema:
          type: string
        required: false
      - in: query
        name: owner_id
        description: Reference owner by ID.
        schema:
          type: string
        required: false
      - in: query
        name: user_id
        description: Reference owner by user ID.
        schema:
          type: string
          default: null
          nullable: true
        required: false
      - in: query
        name: group_id
        description: Reference owner by group ID.
        schema:
          type: string
          default: null
          nullable: true
        required: false
      - in: query
        name: org_id
        description: Reference owner by org ID.
        schema:
          type: string
          default: null
          nullable: true
        required: false
      - in: query
        name: owner
        description: Reference owner by name.
        schema:
          type: string
          pattern: ^(?:(?P<org>[a-z\d](?:[a-z\d]|-(?=[a-z\d])){0,38})\/)?(?P<identity>[a-z\d](?:[a-z\d]|-(?=[a-z\d])){0,38})?$
        required: false
      - in: query
        name: name
        description: Prefix matched search string on deployment name.
        schema:
          type: string
        required: false
      - in: query
        name: prev_key
        description: Previous page key.
        schema:
          type: string
        required: false
      - in: query
        name: next_key
        description: Next page key.
        schema:
          type: string
        required: false
      - in: query
        name: page_size
        description: Page size.
        schema:
          type: integer
          default: 100
          minimum: 1
          maximum: 1000
        required: false
      - in: query
        name: descending
        description: List results in descending order.
        schema:
          type: boolean
          default: false
        required: false
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeploymentList'
          description: Ok
    post:
      summary: Create deployment
