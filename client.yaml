openapi: 3.0.2
components:
  schemas:
    AuthorizationGrant:
      type: object
      properties:
        grant_type:
          type: string
          enum:
          - authorization_code
          - refresh_token
      required:
      - grant_type
    AuthorizationTokenResponse:
      type: object
      properties:
        access_token:
          type: string
        refresh_token:
          type: string
        token_type:
          type: string
        expires_at:
          type: string
          format: date-time
          nullable: true
        refresh_expires_at:
          type: string
          format: date-time
          nullable: true
        expires_in:
          type: integer
          x-unit: seconds
          nullable: true
        refresh_expires_in:
          type: integer
          x-unit: seconds
          nullable: true
      required:
      - access_token
      - expires_at
      - expires_in
      - refresh_expires_at
      - refresh_expires_in
      - refresh_token
      - token_type
    Owner:
      type: object
      properties:
        id:
          type: string
          readOnly: true
        name:
          type: string
          readOnly: true
        identity_name:
          type: string
          readOnly: true
        created_at:
          type: string
          format: '%Y-%m-%dT%H:%M:%S+00:00'
          readOnly: true
        org_admin:
          type: boolean
        org_id:
          type: string
          readOnly: true
        user_id:
          type: string
          readOnly: true
          nullable: true
        group_id:
          type: string
          readOnly: true
          nullable: true
        identity_type:
          type: string
          readOnly: true
        limits_id:
          type: string
          readOnly: true
          nullable: true
        avatar_url:
          type: string
          readOnly: true
        is_multiple_ssh_keys:
          type: boolean
          readOnly: true
    ExtraPackages:
      type: object
      properties:
        pip:
          type: string
          nullable: true
        conda:
          type: string
          nullable: true
        as_environment_yml:
          type: boolean
          default: false
        as_requirements_txt:
          type: boolean
          default: false
        apt:
          type: string
          nullable: true
        cran:
          type: string
          nullable: true
        remotes:
          type: string
          nullable: true
        bioconductor:
          type: string
          nullable: true
        use_mamba:
          type: boolean
          default: false
    ExternalRepoAttachmentPartial:
      type: object
      properties:
        id:
          type: string
          readOnly: true
        has_sshkey:
          type: boolean
          readOnly: true
        path:
          type: string
        created_at:
          type: string
          format: '%Y-%m-%dT%H:%M:%S+00:00'
          readOnly: true
        external_repo_id:
          type: string
        remote_url:
          type: string
          readOnly: true
        on_restart:
          type: string
          enum:
          - preserve changes
          - reclone
          - null
          nullable: true
        ref:
          type: string
          nullable: true
        ref_type:
          type: string
          enum:
          - branch
          - commit
          - tag
          - null
          nullable: true
      required:
      - external_repo_id
      - path
    OwnerName:
      type: object
      properties:
        name:
          type: string
          readOnly: true
        identity_name:
          type: string
          readOnly: true
    ResourceImage:
      type: object
      properties:
        id:
          type: string
          readOnly: true
        name:
          type: string
          readOnly: true
        owner:
          $ref: '#/components/schemas/OwnerName'
    ResourceImageTag:
      type: object
      properties:
        id:
          type: string
        version:
          type: string
        image_uri:
          type: string
        image:
          readOnly: true
          allOf:
          - $ref: '#/components/schemas/ResourceImage'
    Workspace:
      type: object
      properties:
        owner_id:
          type: string
          writeOnly: true
        owner_name:
          type: string
          writeOnly: true
          pattern: ^(?:(?P<org>[a-z\d](?:[a-z\d]|-(?=[a-z\d])){0,38})\/)?(?P<identity>[a-z\d](?:[a-z\d]|-(?=[a-z\d])){0,38})$
        user_id:
          type: string
          writeOnly: true
          nullable: true
        group_id:
          type: string
          writeOnly: true
          nullable: true
        org_id:
          type: string
          writeOnly: true
        owner:
          readOnly: true
          allOf:
          - $ref: '#/components/schemas/Owner'
        name:
          type: string
        image:
          type: string
          writeOnly: true
        image_tag_id:
          type: string
          writeOnly: true
        image_enforce_trusted:
          type: boolean
          writeOnly: true
        extra_packages:
          nullable: true
          allOf:
          - $ref: '#/components/schemas/ExtraPackages'
        ide:
          type: string
        start_script:
          type: string
          nullable: true
        environment_variables:
          type: object
          additionalProperties:
            type: string
        working_dir:
          type: string
        description:
