openapi: 3.0.3
components:
  schemas:
    Recipe:
      discriminator:
        propertyName: type
        mapping:
          deployment: '#/components/schemas/DeploymentRecipe'
          job: '#/components/schemas/JobRecipe'
          workspace: '#/components/schemas/WorkspaceRecipe'
          image: '#/components/schemas/ImageRecipe'
      oneOf:
      - $ref: '#/components/schemas/DeploymentRecipe'
      - $ref: '#/components/schemas/JobRecipe'
      - $ref: '#/components/schemas/WorkspaceRecipe'
      - $ref: '#/components/schemas/ImageRecipe'
      type: object
      properties: {}
    OwnerByName:
      type: object
      properties:
        name:
          type: string
          description: Reference owner by name.
      required:
      - name
    OwnerById:
      type: object
      properties:
        id:
          type: string
          description: Reference owner by ID.
      required:
      - id
    OwnerByIdentityId:
      type: object
      properties:
        user_id:
          type: string
          default: null
          description: Reference owner by user ID.
          nullable: true
        group_id:
          type: string
          default: null
          description: Reference owner by group ID.
          nullable: true
        org_id:
          type: string
          default: null
          description: Reference owner by org ID.
          nullable: true
    OwnerByPath:
      type: string
      pattern: ^(?:(?P<org>[a-z\d](?:[a-z\d]|-(?=[a-z\d])){0,38})\/)?(?P<identity>[a-z\d](?:[a-z\d]|-(?=[a-z\d])){0,38})?$
      description: Reference owner by name.
    OwnerReference:
      oneOf:
      - $ref: '#/components/schemas/OwnerByName'
      - $ref: '#/components/schemas/OwnerById'
      - $ref: '#/components/schemas/OwnerByIdentityId'
      - $ref: '#/components/schemas/OwnerByPath'
    ImageTagById:
      type: object
      properties:
        tag_id:
          type: string
        enforce_trusted:
          type: boolean
          default: true
          writeOnly: true
      required:
      - tag_id
    ImageTagByUri:
      type: object
      properties:
        uri:
          type: string
        owner:
          $ref: '#/components/schemas/OwnerReference'
        enforce_trusted:
          type: boolean
          default: true
          writeOnly: true
      required:
      - uri
    ImageTagByName:
      type: object
      properties:
        name:
          type: string
        version:
          type: string
        owner:
          $ref: '#/components/schemas/OwnerReference'
        enforce_trusted:
          type: boolean
          default: true
          writeOnly: true
      required:
      - name
      - version
    ImageTagByPath:
      type: string
    ImageTagReference:
      oneOf:
      - $ref: '#/components/schemas/ImageTagById'
      - $ref: '#/components/schemas/ImageTagByUri'
      - $ref: '#/components/schemas/ImageTagByName'
      - $ref: '#/components/schemas/ImageTagByPath'
    ExtraPackagesRecipe:
      type: object
      properties:
        pip:
          type: object
          properties:
            install:
              type: string
            requirements_txt:
              type: string
        conda:
          type: object
          properties:
            install:
              type: string
            environment_yml:
              type: string
            use_mamba:
              type: boolean
              default: false
        apt:
          type: object
          properties:
            install:
              type: string
        cran:
          type: object
          properties:
            install:
              type: string
        remotes:
          type: object
          properties:
            install:
              type: string
        bioconductor:
          type: object
          properties:
            install:
              type: string
    DaskClusterAttachment:
      type: object
      properties:
        num_workers:
          type: integer
          minimum: 0
        scheduler:
          type: object
          properties:
            instance_type:
              type: string
          required:
          - instance_type
        worker:
          type: object
          properties:
            instance_type:
              type: string
            num_processes:
              type: integer
            num_threads:
              type: integer
            use_spot_instances:
              type: boolean
              default: false
          required:
          - instance_type
        status:
          type: string
          enum:
          - stopped
          - running
          - null
          nullable: true
      required:
      - num_workers
      - scheduler
      - worker
    ExternalRepoAttachmentRecipe:
      type: object
      properties:
        url:
          type: string
        path:
          type: string
        on_restart:
          type: string
          enum:
          - preserve changes
          - reclone
        reference:
          type: string
          nullable: true
        reference_type:
          type: string
          default: branch
          enum:
          - branch
          - commit
          - tag
        public:
          type: boolean
          default: false
      required:
      - url
    SecretAttachmentType:
      type: string
      enum:
      - environment_variable
      - file
    SecretAttachmentRecipe:
      type: object
      properties:
        location:
          type: string
        attachment_type:
          $ref: '#/components/schemas/SecretAttachmentType'
        description:
          type: string
          default: ''
          maxLength: 2048
        owner:
          $ref: '#/components/schemas/OwnerReference'
        name:
          type: string
      required:
      - attachment_type
      - location
    SharedFolderAttachmentRecipe:
      type: object
      properties:
        owner:
          $ref: '#/components/schemas/OwnerReference'
        name:
          type: string
        path:
          type: string
      required:
      - name
    DeploymentRouteRecipe:
      type: object
      properties:
        subdomain:
          type: string
          default: ''
        container_port:
          type: integer
          minimum: 1024
          maximum: 65535
        visibility:
          type: string
          enum:
          - unauthenticated
          - account
          - org
          - owner
      required:
      - container_port
    RouteById:
      type: object
      properties:
        id:
          type: string
      required:
      - id
    RouteBySubdomain:
      type: object
      properties:
        subdomain:
          type: string
      required:
      - subdomain
    RouteBySubdomainPath:
      type: string
    RouteByContainerPort:
      type: object
      properties:
        container_port:
          type: integer
          minimum: 1024
          maximum: 65535
      required:
      - container_port
    RouteReference:
      oneOf:
      - $ref: '#/components/schemas/RouteById'
      - $ref: '#/components/schemas/RouteBySubdomain'
      - $ref: '#/components/schemas/RouteBySubdomainPath'
      - $ref: '#/components/schemas/RouteByContainerPort'
    ViewerRecipe:
      type: object
      properties:
        identity:
          type: string
        route:
          $ref: '#/components/schemas/RouteReference'
      required:
      - identity
    DeploymentSpec:
      type: object
      properties:
        name:
          type: string
        owner:
          $ref: '#/components/schemas/OwnerReference'
        description:
          type: string
          maxLength: 2048
        tags:
          type: object
          additionalProperties:
            type: string
          nullable: true
        image:
          $ref: '#/components/schemas/ImageTagReference'
        instance_type:
          type: string
        environment_variables:
          type: object
          additionalProperties:
            type: string
        working_directory:
          type: string
        extra_packages:
          $ref: '#/components/schemas/ExtraPackagesRecipe'
        start_script:
          type: string
          nullable: true
        token_scope:
          type: string
          nullable: true
        dask_cluster:
          $ref: '#/components/schemas/DaskClusterAttachment'
        git_repositories:
          type: array
          items:
            $ref: '#/components/schemas/ExternalRepoAttachmentRecipe'
        secrets:
          type: array
          items:
            $ref: '#/components/schemas/SecretAttachmentRecipe'
        shared_folders:
          type: array
          items:
            $ref: '#/components/schemas/SharedFolderAttachmentRecipe'
        start_dind:
          type: boolean
        status:
          type: string
          enum:
          - stopped
          - running
          - null
          writeOnly: true
          nullable: true
        command:
          type: string
          minLength: 1
        scale:
          type: integer
          default: 1
          minimum: 1
        start_ssh:
          type: boolean
          default: false
        use_spot_instance:
          type: boolean
          default: false
        routes:
          type: array
          items:
            $ref: '#/components/schemas/DeploymentRouteRecipe'
        viewers:
          type: array
          items:
            $ref: '#/components/schemas/ViewerRecipe'
      required:
      - command
      - image
      - instance_type
      - name
    ResourceState:
      type: object
      properties:
        id:
          type: string
          readOnly: true
        action:
          type: string
          readOnly: true
        status:
          type: string
          readOnly: true
      required:
      - id
      - status
    DeploymentRecipe:
      type: object
      properties:
        schema_version:
          type: string
          default: 2025.10.01
        type:
          type: string
          enum:
          - deployment
        spec:
          $ref: '#/components/schemas/DeploymentSpec'
        state:
          readOnly: true
          allOf:
          - $ref: '#/components/schemas/ResourceState'
      required:
      - spec
      - type
    JobSpec:
      type: object
      properties:
        name:
          type: string
        owner:
          $ref: '#/components/schemas/OwnerReference'
        description:
          type: string
          maxLength: 2048
        tags:
          type: object
          additionalProperties:
            type: string
          nullable: true
        image:
          $ref: '#/components/schemas/ImageTagReference'
        instance_type:
          type: string
        environment_variables:
          type: object
          additionalProperties:
            type: string
        working_directory:
          type: string
        extra_packages:
          $ref: '#/components/schemas/ExtraPackagesRecipe'
        start_script:
          type: string
          nullable: true
        token_scope:
          type: string
          nullable: true
        dask_cluster:
          $ref: '#/components/schemas/DaskClusterAttachment'
        git_repositories:
          type: array
          items:
            $ref: '#/components/schemas/ExternalRepoAttachmentRecipe'
        secrets:
          type: array
          items:
            $ref: '#/components/schemas/SecretAttachmentRecipe'
        shared_folders:
          type: array
          items:
            $ref: '#/components/schemas/SharedFolderAttachmentRecipe'
        start_dind:
          type: boolean
        status:
          type: string
          enum:
          - stopped
          - running
          - null
          writeOnly: true
          nullable: true
        command:
          type: string
          minLength: 1
        scale:
          type: integer
          default: 1
          minimum: 1
        use_spot_instance:
          type: boolean
          default: false
        schedule:
          type: string
          nullable: true
        concurrency_policy:
          type: string
          enum:
          - Allow
          - Forbid
          - Replace
        retries:
          type: integer
          minimum: 0
      required:
      - command
      - image
      - instance_type
      - name
    JobRecipe:
      type: object
      properties:
        schema_version:
          type: string
          default: 2025.10.01
        type:
          type: string
          enum:
          - job
        spec:
          $ref: '#/components/schemas/JobSpec'
        state:
          readOnly: true
          allOf:
          - $ref: '#/components/schemas/ResourceState'
      required:
      - spec
      - type
    WorkspaceRouteRecipe:
      type: object
      properties:
        subdomain:
          type: string
          default: ''
        container_port:
          type: integer
          minimum: 1024
          maximum: 65535
        visibility:
          type: string
          enum:
          - org
          - owner
      required:
